<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragontorpedo Web Directory</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --bg-color: #07080a; /* Ultra Dark Deep Obsidian */
            --card-bg: rgba(21, 26, 35, 0.65); /* Glassmorphism Base */
            --accent-gold: #d4af37; /* Metallic Pure Gold */
            --accent-glow: rgba(212, 175, 55, 0.15);
            --text-main: #f5f6f8; /* Soft Off-White */
            --text-muted: #8a919b; /* Platinum Gray */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #111622 0%, var(--bg-color) 70%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            letter-spacing: 0.02em;
        }

        .hub-container {
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        header {
            margin-bottom: 45px;
            position: relative;
        }

        /* Subtle luxury accent line under header */
        header::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: 20px auto 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300; /* Sleek high-end thin weight */
            letter-spacing: 0.08em;
            color: var(--text-main);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hub-button {
            display: block;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); /* Ultra smooth transition */
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Ambient subtle gold border on hover */
        .hub-button:hover {
            border-color: rgba(214, 175, 85, 0.4);
            background-color: rgba(21, 26, 35, 0.8);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6), 0 0 15px var(--accent-glow);
            color: #ffffff;
        }

        /* Elegant inline separator styling */
        .hub-button span {
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="hub-container">
    <header>
        <h1>Dragontorpedo Web Directory</h1>
        <p>A central hub for all common Dragontorpedo platforms</p>
    </header>

    <main class="links-wrapper">
        <a href="https://dragontorpedo.github.io/habitchecker/" target="_blank" class="hub-button">🌐 HabitChecker</a>
        <a href="https://dragontorpedo.github.io/aiusageguide/" target="_blank" class="hub-button">⚡ Ai Guide</a>
        <a href="https://your-third-website.com" target="_blank" class="hub-button">📈 Portfolio Dashboard</a>
        <a href="https://github.com/dragontorpedo" target="_blank" class="hub-button">🐙 Official GitHub Profile</a>
    </main>
</div>

</body>
</html>
