<style>
    :root { 
        --p1-accent: #1a73e8; 
        --p1-glow: rgba(26, 115, 232, 0.3); 
        --glass-bg: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.15);
        --highlight: rgba(255, 255, 255, 0.2);
    }
    
    @keyframes bubble-rise {
        0% { transform: translateY(100%) translateX(0); opacity: 0; }
        50% { opacity: 0.4; }
        100% { transform: translateY(-120%) translateX(20px); opacity: 0; }
    }
    .bubble {
        position: absolute; background: #fff;
        border-radius: 50%; pointer-events: none; z-index: 1;
        animation: bubble-rise 4s infinite linear;
        box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .glass-chassis {
        background: var(--glass-bg);
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 40px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 1px var(--highlight);
        position: relative;
        overflow: hidden;
        max-width: 550px;
        margin: auto;
        transform-style: preserve-3d;
    }

    .grid-bg {
        position: absolute; inset: 0;
        background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 30px 30px; z-index: 0; pointer-events: none;
    }

    @keyframes hyper-flash {
        0% { filter: contrast(2) brightness(2) saturate(2); }
        100% { filter: contrast(1) brightness(1) saturate(1); }
    }
    .flash-active { animation: hyper-flash 0.4s ease-out; }

    @keyframes text-reveal {
        from { opacity: 0; transform: translateX(-15px); filter: blur(8px); }
        to { opacity: 1; transform: translateX(0); filter: blur(0); }
    }

    .glass-chassis h1, .glass-chassis span, .glass-chassis div, .glass-chassis b {
        color: #ffffff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
</style>

<div id="p1-scene" style="perspective: 1200px; padding: 60px 20px;">
    <div id="p1-card" class="glass-chassis" onmousemove="handleParallax(event)" onmouseleave="resetParallax()" style="padding: 50px; transition: transform 0.1s ease-out;">

        <div class="grid-bg"></div>
        <div id="bubbles-container"></div>

        <div id="glow-core" style="position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at center, var(--p1-glow) 0%, transparent 45%); z-index: 0; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none;"></div>

        <div style="position: relative; z-index: 3;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 45px;">
                <div>
                    <div id="p1-status" style="font-size: 10px; font-weight: 800; letter-spacing: 4px; color: rgba(255,255,255,0.5) !important; text-transform: uppercase; margin-bottom: 8px;">Phase_01 // Nightly</div>
                    <h1 style="margin: 0; font-size: 30px; font-weight: 200; letter-spacing: -1px;">Subconscious <b id="mode-text" style="color: #1a73e8; font-weight: 800; transition: 0.4s;">Sync</b></h1>
                </div>
                <div onclick="toggleExtreme()" style="width: 54px; height: 26px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 13px; cursor: pointer; position: relative; backdrop-filter: blur(5px);">
                    <div id="p1-toggle" style="width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 4px; transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); box-shadow: 0 0 15px #fff;"></div>
                </div>
            </div>

            <div id="p1-content" style="display: flex; flex-direction: column; gap: 38px;"></div>
        </div>
    </div>
</div>

<script>
let isExtreme = false;

function handleParallax(e) {
    const card = document.getElementById('p1-card');
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rotateX = (rect.height / 2 - y) / 15; 
    const rotateY = (x - rect.width / 2) / 15;
    card.style.transition = "none";
    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
}

function resetParallax() {
    const card = document.getElementById('p1-card');
    card.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
    card.style.transform = `rotateX(0deg) rotateY(0deg)`;
}

function createBubbles() {
    const container = document.getElementById('bubbles-container');
    container.innerHTML = '';
    for(let i=0; i<12; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        b.style.left = Math.random() * 100 + '%';
        b.style.bottom = '-10px';
        b.style.width = b.style.height = Math.random() * 4 + 2 + 'px';
        b.style.animationDelay = Math.random() * 4 + 's';
        b.style.opacity = Math.random() * 0.4;
        container.appendChild(b);
    }
}

function toggleExtreme() {
    isExtreme = !isExtreme;
    const card = document.getElementById('p1-card');
    const toggle = document.getElementById('p1-toggle');
    const status = document.getElementById('p1-status');
    const modeText = document.getElementById('mode-text');
    
    card.classList.add('flash-active');
    setTimeout(() => card.classList.remove('flash-active'), 400);

    if(isExtreme) {
        document.documentElement.style.setProperty('--p1-accent', '#ff4500');
        document.documentElement.style.setProperty('--p1-glow', 'rgba(255, 69, 0, 0.4)');
        toggle.style.left = '30px';
        toggle.style.background = '#ff4500';
        toggle.style.boxShadow = '0 0 20px #ff4500';
        status.innerText = "Phase_01 // Extreme";
        modeText.innerText = "Override";
        modeText.style.color = "#ff4500";
        card.style.borderColor = 'rgba(255, 69, 0, 0.4)';
    } else {
        document.documentElement.style.setProperty('--p1-accent', '#1a73e8');
        document.documentElement.style.setProperty('--p1-glow', 'rgba(26, 115, 232, 0.3)');
        toggle.style.left = '4px';
        toggle.style.background = '#fff';
        toggle.style.boxShadow = '0 0 15px #fff';
        status.innerText = "Phase_01 // Nightly";
        modeText.innerText = "Sync";
        modeText.style.color = "#1a73e8";
        card.style.borderColor = 'rgba(255, 255, 255, 0.15)';
    }
    renderContent();
}

function renderContent() {
    const container = document.getElementById('p1-content');
    const accent = isExtreme ? '#ff4500' : '#1a73e8';
    
    const content = isExtreme ? [
        { time: "20:45", title: "SYSTEM CLEANSE & PARETO AUDIT", details: "• <b>5m KISS Audit:</b> Cut the noise. What is 1 thing to STOP tomorrow?<br>• <b>High-Yield Targeting:</b> Sync to the 20% syllabus heavy-hitters.<br>• <b>Visual Priming:</b> Open workspace to your 'Blurting' page." },
        { time: "21:00", title: "IDENTITY RE-WIRING & LOCI MAPPING", details: "• <b>The Script:</b> Write 'I am the master of [Skill]' 10x.<br>• <b>Loci Pathing:</b> Mentally anchor your 3 hardest concepts to room corners.<br>• <b>Pre-Sleep Sync:</b> Visualize the first 60s of your morning spike." },
        { time: "21:05", title: "THETA-STATE HARDWIRING", details: "• <b>Anki Burn:</b> 5m rapid recall. End on a win.<br>• <b>Edison Protocol:</b> Rehearse technical shifts in a hypnagogic state.<br>• <b>Digital Blackout:</b> Phone to zero. Subconscious is now locked." }
    ] : [
        { time: "20:45", title: "BUFFER & RESET", details: "• <b>KISS Audit:</b> Identify Keep/Improve/Start/Stop.<br>• <b>Goal Locking:</b> Pick 3 SMART goals for tomorrow morning.<br>• <b>Space Prep:</b> Clear desk; set violin on stand." },
        { time: "21:00", title: "SUBCONSCIOUS SEEDING", details: "• <b>Why/How Qs:</b> Write down 3 problems for your brain to solve.<br>• <b>Wake Visualization:</b> Mentally rehearse your 06:00 wake-up routine." },
        { time: "21:05", title: "DATA CONSOLIDATION", details: "• <b>Dual Coding:</b> Final look at 1 diagram + 1 acronym.<br>• <b>Exile Protocol:</b> Move phone out of reach. Activate physical alarm." }
    ];

    container.innerHTML = content.map((item, i) => `
        <div style="display: flex; align-items: flex-start; gap: 25px; animation: text-reveal 0.6s ease-out both; animation-delay: ${i*0.1}s;">
            <div style="width: 8px; height: 8px; background: ${accent}; border-radius: 50%; margin-top: 6px; box-shadow: 0 0 12px ${accent}; border: 2px solid rgba(255,255,255,0.4); flex-shrink: 0;"></div>
            <div>
                <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;">
                    <span style="font-size: 13px; font-weight: 700; font-family: monospace; opacity: 0.9;">${item.time}</span>
                    <span style="font-size: 11px; font-weight: 800; color: ${accent} !important; letter-spacing: 1px; text-transform: uppercase;">${item.title}</span>
                </div>
                <div style="font-size: 13px; color: rgba(255,255,255,0.6) !important; line-height: 1.6;">${item.details}</div>
            </div>
        </div>
    `).join('');
}

createBubbles();
renderContent();
</script>
