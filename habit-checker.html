<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABIT KERNEL // CORE TRACKING TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Core Variable Architecture Matrix */
        :root { 
            --p1-accent: #e8b84b; 
            --p1-glow: rgba(232, 184, 75, 0.25); 
            --p1-accent-rgb: 232, 184, 75;
            --glass-bg: rgba(10, 8, 12, 0.55);
            --glass-border: rgba(232, 184, 75, 0.15);
            --highlight: rgba(255, 255, 255, 0.04);
            --panel-shadow: rgba(0, 0, 0, 0.85);
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* Reset & Base System Properties */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #000000;
            color: #d1c7b7;
            min-height: 100vh;
            font-family: var(--font-mono);
            font-size: 13px;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            letter-spacing: -0.02em;
        }

        /* Custom OS Scrollbar Elements */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--p1-accent-rgb), 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--p1-accent); }

        /* Hardware Accelerated Background Canvas & Container */
        #p1-scene {
            perspective: 2000px;
            width: 100%;
            max-width: 1050px;
            z-index: 1;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Premium Glass Chassis Enclosure */
        .glass-chassis {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(140%);
            -webkit-backdrop-filter: blur(40px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 50px 100px var(--panel-shadow), inset 0 1px 2px var(--highlight);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.5s ease, box-shadow 0.5s ease;
            padding: 35px;
        }

        /* Typography & Functional Highlights */
        .text-glow {
            text-shadow: 0 0 15px var(--p1-glow);
        }
        .scanline {
            animation: textScan 4s infinite ease-in-out;
        }
        @keyframes textScan { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Interactive Interface Grid System Architecture */
        .habit-table-container { 
            overflow-x: auto; 
            border-radius: 14px; 
            position: relative; 
            z-index: 2; 
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(0, 0, 0, 0.2);
        }

        table { border-collapse: separate; border-spacing: 5px; width: 100%; }
        
        .habit-label { 
            position: sticky; 
            left: 0; 
            background: rgba(12, 10, 15, 0.85); 
            backdrop-filter: blur(15px); 
            z-index: 10; 
            font-size: 10px; 
            font-weight: 700; 
            padding: 14px; 
            min-width: 170px; 
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: left;
            letter-spacing: 0.1em;
            color: #a49e94;
        }

        /* Bespoke Luxury Precision Habit Cell Matrix */
        .cell { 
            width: 26px; 
            height: 26px; 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .cell:hover {
            background: rgba(var(--p1-accent-rgb), 0.15);
            border-color: rgba(var(--p1-accent-rgb), 0.5);
            transform: scale(1.08);
        }
        .cell.active { 
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, var(--p1-accent) 70%);
            box-shadow: 0 0 18px var(--p1-glow), inset 0 1px 0 rgba(255,255,255,0.4); 
            border-color: #ffffff; 
            transform: scale(1.05);
        }

        /* Interactive Controls Button Elements */
        .btn-glass {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d1c7b7; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 9px;
            font-weight: 700; 
            cursor: pointer; 
            letter-spacing: 0.15em;
            font-family: var(--font-mono);
            transition: all 0.2s ease;
        }
        .btn-glass:hover { 
            background: var(--p1-accent); 
            color: #000000;
            border-color: var(--p1-accent);
            box-shadow: 0 0 15px var(--p1-glow);
        }

        /* Advanced Data Analytics Card Layout */
        .stat-card {
            background: rgba(0, 0, 0, 0.25); 
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 22px; 
            border-radius: 14px; 
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .stat-card:hover {
            border-color: rgba(var(--p1-accent-rgb), 0.25);
        }

        /* System Terminal Logging Output Component */
        #systemLog {
            font-size: 10px;
            color: var(--p1-accent); 
            height: 60px; 
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            line-height: 1.6;
        }

        /* Glassmorphic Modal Window Protocol */
        .modal-overlay {
            display: none; 
            position: absolute; 
            inset: 0;
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(20px); 
            z-index: 100;
            align-items: center; 
            justify-content: center;
            padding: 30px;
        }
        .modal-window {
            background: #09080c;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 18px;
            border: 1px solid var(--p1-accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        textarea {
            width: 100%; 
            height: 110px; 
            background: rgba(0,0,0,0.4); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 8px; 
            padding: 12px; 
            font-family: var(--font-mono); 
            font-size: 11px; 
            margin-bottom: 20px;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: var(--p1-accent);
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="p1-scene">
    <div id="p1-card" class="glass-chassis" onmousemove="handleParallax(event)" onmouseleave="resetParallax()">
        
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 35px; position: relative; z-index: 5;">
            <div>
                <div id="p1-status" class="scanline" style="font-size: 9px; font-weight: 800; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 6px;">Habit_Kernel // Core_Engine_Active</div>
                <h1 style="margin: 0; font-size: 32px; font-weight: 300; letter-spacing: -1px; color: #fff;">April <span id="mode-text" class="text-glow" style="color: var(--p1-accent); font-weight: 800; transition: color 0.4s;">2026</span></h1>
            </div>
            
            <div style="display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.02); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);">
                <span id="view-label" style="font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.4); letter-spacing: 0.1em;">GRID_OPERATIONS</span>
                <div onclick="toggleView()" style="width: 46px; height: 22px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 11px; cursor: pointer; position: relative; transition: all 0.3s;">
                    <div id="p1-toggle" style="width: 14px; height: 14px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 0 10px #fff;"></div>
                </div>
            </div>
        </div>

        <div id="view-grid" style="position: relative; z-index: 5;">
            <div style="display: flex; gap: 10px; margin-bottom: 25px; align-items: center;">
                <button onclick="exportData()" class="btn-glass">💾 EXPORT DATA</button>
                <button onclick="toggleRestoreBox()" class="btn-glass">📥 RESTORE CORE</button>
                <div id="streak-flame" style="margin-left: auto; background: rgba(232,184,75,0.06); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(232,184,75,0.2); font-size: 10px; font-weight: 800; color: var(--p1-accent); tracking: 0.05em; transition: all 0.4s;">🔥 MATRIX_STREAK: 0D</div>
            </div>

            <div class="habit-table-container">
                <table>
                    <thead><tr id="calendarHeader"></tr></thead>
                    <tbody id="habitRows"></tbody>
                </table>
            </div>
        </div>

        <div id="view-analysis" style="display: none; position: relative; z-index: 5;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px;">
                <div class="stat-card">
                    <div style="font-size: 8px; color: rgba(255,255,255,0.3); margin-bottom: 8px; letter-spacing: 0.1em;">VOLUMETRIC CONSISTENCY</div>
                    <div id="avg-consistency" class="text-glow" style="font-size: 28px; font-weight: 800; color: #fff;">--%</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 8px; color: rgba(255,255,255,0.3); margin-bottom: 8px; letter-spacing: 0.1em;">QUANTUM_7D_LOGS</div>
                    <div id="total-logs" style="font-size: 28px; font-weight: 800; color: #fff;">0</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 8px; color: rgba(255,255,255,0.3); margin-bottom: 8px; letter-spacing: 0.1em;">PEAK_BURST_PERIOD</div>
                    <div id="peak-day" class="text-glow" style="font-size: 16px; font-weight: 800; color: var(--p1-accent); margin-top: 10px;">--</div>
                </div>
            </div>
            
            <div style="background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.03); padding: 25px; border-radius: 16px;">
                <span style="font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); letter-spacing: 0.15em; display: block; margin-bottom: 15px;">// FRICTION WAVE COMPLETION REPORT</span>
                <div id="friction-report" style="display: flex; flex-direction: column; gap: 16px;"></div>
            </div>
        </div>

        <div style="margin-top: 35px; position: relative; z-index: 5;">
            <div style="font-size: 8px; font-weight: 800; color: rgba(255,255,255,0.2); margin-bottom: 10px; letter-spacing: 3px;">NEURAL_KERNEL_TELEMETRY</div>
            <div id="systemLog">> Systems Operational. Integrity Checked...</div>
        </div>

        <div id="restoreContainer" class="modal-overlay">
            <div class="modal-window">
                <div style="font-size: 11px; font-weight: 800; color: var(--p1-accent); letter-spacing: 0.1em; margin-bottom: 12px;">INJECT DATA MATRIX HEX</div>
                <textarea id="importArea" placeholder="Paste custom string matrix payload..."></textarea>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button onclick="toggleRestoreBox()" class="btn-glass" style="border-color: rgba(255,255,255,0.05)">ABORT</button>
                    <button onclick="processImport()" class="btn-glass" style="background: var(--p1-accent); color: #000; border-color: var(--p1-accent)">ENGAGE_CORE</button>
                </div>
            </div>
        </div>
        
    </div>
</div>

<script>
    // Configuration Architecture
    const habits = [
        { name: "Plan day", emoji: "🌠" }, { name: "Emails", emoji: "📬" },
        { name: "Read", emoji: "📖" }, { name: "Violin", emoji: "🎻" },
        { name: "Math", emoji: "📐" }, { name: "Exercise", emoji: "🏋️" }
    ];

    const now = new Date();
    const curM = now.getMonth(); const curY = now.getFullYear(); const today = now.getDate();
    const daysInMonth = new Date(curY, curM + 1, 0).getDate();
    let history = JSON.parse(localStorage.getItem('habit_glass_premium_v4')) || {};
    let isAnalysis = false;

    // ── INTERACTIVE QUANTUM GRID CANVAS ENGINE ──
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let mouse = { x: undefined, y: undefined };

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseout', () => { mouse.x = undefined; mouse.y = undefined; });
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.baseX = this.x;
            this.baseY = this.y;
            this.density = (Math.random() * 30) + 15;
        }
        draw() {
            ctx.fillStyle = isAnalysis ? 'rgba(255, 69, 0, 0.15)' : 'rgba(232, 184, 75, 0.15)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();
        }
        update() {
            if (mouse.x !== undefined && mouse.y !== undefined) {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = 150;
                let force = (maxDistance - distance) / maxDistance;
                if (distance < maxDistance) {
                    this.x -= forceDirectionX * force * this.density;
                    this.y -= forceDirectionY * force * this.density;
                } else {
                    if (this.x !== this.baseX) this.x -= (this.x - this.baseX) * 0.1;
                    if (this.y !== this.baseY) this.y -= (this.y - this.baseY) * 0.1;
                }
            } else {
                if (this.x !== this.baseX) this.x -= (this.x - this.baseX) * 0.1;
                if (this.y !== this.baseY) this.y -= (this.y - this.baseY) * 0.1;
            }
        }
    }

    const particles = Array.from({ length: 90 }, () => new Particle());

    function animateBg() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw elegant high-end static background mesh grid lines
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
        ctx.lineWidth = 1;
        const gridSize = 50;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateBg);
    }
    animateBg();

    // ── PREMIUM ROTATION EFFECTS ──
    function handleParallax(e) {
        const card = document.getElementById('p1-card');
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) - rect.width / 2;
        const y = (e.clientY - rect.top) - rect.height / 2;
        card.style.transform = `rotateX(${-y / 55}deg) rotateY(${x / 75}deg)`;
    }

    function resetParallax() {
        document.getElementById('p1-card').style.transform = `rotateX(0deg) rotateY(0deg)`;
    }

    // ── COMPREHENSIVE CONTROL MODULATORS ──
    function toggleView() {
        isAnalysis = !isAnalysis;
        const toggle = document.getElementById('p1-toggle');
        const gridView = document.getElementById('view-grid');
        const anaView = document.getElementById('view-analysis');
        const flame = document.getElementById('streak-flame');
        
        if(isAnalysis) {
            toggle.style.left = '27px';
            document.documentElement.style.setProperty('--p1-accent', '#ff4500');
            document.documentElement.style.setProperty('--p1-glow', 'rgba(255, 69, 0, 0.35)');
            document.documentElement.style.setProperty('--p1-accent-rgb', '255, 69, 0');
            document.documentElement.style.setProperty('--glass-border', 'rgba(255, 69, 0, 0.15)');
            
            gridView.style.display = 'none';
            anaView.style.display = 'block';
            document.getElementById('view-label').innerText = "DEEP_ANALYTICS";
            runWeeklyScan();
        } else {
            toggle.style.left = '3px';
            document.documentElement.style.setProperty('--p1-accent', '#e8b84b');
            document.documentElement.style.setProperty('--p1-glow', 'rgba(232, 184, 75, 0.25)');
            document.documentElement.style.setProperty('--p1-accent-rgb', '232, 184, 75');
            document.documentElement.style.setProperty('--glass-border', 'rgba(232, 184, 75, 0.15)');
            
            gridView.style.display = 'block';
            anaView.style.display = 'none';
            document.getElementById('view-label').innerText = "GRID_OPERATIONS";
        }
        addLog(isAnalysis ? "ANALYTICS_CORE_CONNECTED" : "GRID_OPERATIONS_RESTORED");
    }

    function addLog(msg) {
        const log = document.getElementById('systemLog');
        log.innerHTML += `<br>> [${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    function render() {
        // Render Calendar Column Header Sequence
        let hHtml = '<th class="habit-label">HABIT_CORE</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const isToday = i === today;
            hHtml += `<th style="font-size: 9px; font-weight: 700; opacity: ${isToday ? '1' : '0.25'}; padding: 6px; color: ${isToday ? 'var(--p1-accent)' : '#fff'}; ${isToday ? 'text-shadow: 0 0 8px var(--p1-glow);' : ''}">${String(i).padStart(2, '0')}</th>`;
        }
        document.getElementById('calendarHeader').innerHTML = hHtml;

        // Render Dynamic Rows Matrix
        let rHtml = "";
        habits.forEach(h => {
            rHtml += `<tr><td class="habit-label">${h.emoji} ${h.name.toUpperCase()}</td>`;
            for(let i=1; i<=daysInMonth; i++) {
                const k = `${curY}-${curM}-${h.name}-${i}`;
                rHtml += `<td><div class="cell ${history[k]?'active':''}" onclick="toggleHabit('${h.name}', ${i})"></div></td>`;
            }
            rHtml += `</tr>`;
        });
        document.getElementById('habitRows').innerHTML = rHtml;
        calculateStreaks();
    }

    function toggleHabit(name, day) {
        const k = `${curY}-${curM}-${name}-${day}`;
        history[k] = !history[k];
        localStorage.setItem('habit_glass_premium_v4', JSON.stringify(history));
        addLog(`CELL_MUTATION // ${name.toUpperCase()} // D${day} // ${history[k]?'ENGAGED':'PURGED'}`);
        render();
    }

    function calculateStreaks() {
        let maxGlobalStreak = 0;
        
        habits.forEach(h => {
            let currentStreak = 0;
            let checkDay = today;
            
            while (checkDay > 0) {
                const k = `${curY}-${curM}-${h.name}-${checkDay}`;
                if (history[k]) {
                    currentStreak++;
                    checkDay--;
                } else {
                    // Check if they missed today but had a streak up to yesterday
                    if (checkDay === today) {
                        checkDay--;
                        continue;
                    }
                    break;
                }
            }
            if (currentStreak > maxGlobalStreak) maxGlobalStreak = currentStreak;
        });

        const flame = document.getElementById('streak-flame');
        flame.innerText = `🔥 MATRIX_STREAK: ${maxGlobalStreak}D`;
        if(maxGlobalStreak > 0) {
            flame.style.background = 'rgba(232,184,75,0.08)';
            flame.style.color = 'var(--p1-accent)';
            flame.style.borderColor = 'rgba(232,184,75,0.3)';
        } else {
            flame.style.background = 'rgba(255,255,255,0.02)';
            flame.style.color = 'rgba(255,255,255,0.2)';
            flame.style.borderColor = 'rgba(255,255,255,0.05)';
        }
    }

    function runWeeklyScan() {
        let total = 0; let habitCounts = {};
        const range = 7;
        
        for (let i = 0; i < range; i++) {
            let d = today - i; if (d <= 0) continue;
            habits.forEach(h => {
                if (history[`${curY}-${curM}-${h.name}-${d}`]) {
                    total++; habitCounts[h.name] = (habitCounts[h.name] || 0) + 1;
                }
            });
        }
        
        const consistencyPct = Math.round((total / (habits.length * range)) * 100);
        document.getElementById('avg-consistency').innerText = consistencyPct + "%";
        document.getElementById('total-logs').innerText = total;

        // Determine Peak Execution Windows dynamically
        let peakHabit = "--"; let maxCount = 0;
        habits.forEach(h => {
            if ((habitCounts[h.name] || 0) > maxCount) {
                maxCount = habitCounts[h.name]; peakHabit = h.name.toUpperCase();
            }
        });
        document.getElementById('peak-day').innerText = maxCount > 0 ? `${peakHabit} (${maxCount}D)` : "NO WAVE";
        
        // Render Advanced Linear Progress Output Modules
        let fHtml = "";
        habits.forEach(h => {
            let c = habitCounts[h.name] || 0;
            let pct = (c / range) * 100;
            fHtml += `<div>
                <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:10px; font-weight:700; letter-spacing:0.05em;">
                    <span style="color:#a49e94;">${h.name.toUpperCase()}</span>
                    <span style="color:var(--p1-accent);">${c} / ${range} DAYS</span>
                </div>
                <div style="height:4px; background:rgba(255,255,255,0.03); border-radius:10px; overflow:hidden;">
                    <div style="width:${pct}%; height:100%; background:linear-gradient(90deg, var(--p1-accent), #ffffff); box-shadow:0 0 10px var(--p1-glow); transition: width 0.6s ease;"></div>
                </div>
            </div>`;
        });
        document.getElementById('friction-report').innerHTML = fHtml;
    }

    // ── PERSISTENCE EXPORT ENGINE MATRIX ──
    window.exportData = () => { 
        navigator.clipboard.writeText(JSON.stringify(history)); 
        addLog("SYSTEM_STATE_CACHED_TO_CLIPBOARD"); 
        alert("Hex core telemetry copied into secure buffer storage array.");
    };
    
    window.toggleRestoreBox = () => { 
        const el = document.getElementById('restoreContainer');
        el.style.display = el.style.display === 'flex' ? 'none' : 'flex'; 
    };
    
    window.processImport = () => { 
        try {
            const rawData = document.getElementById('importArea').value.trim();
            if(!rawData) return;
            history = JSON.parse(rawData); 
            localStorage.setItem('habit_glass_premium_v4', JSON.stringify(history)); 
            render(); 
            toggleRestoreBox(); 
            addLog("CORE_RECONSTRUCTION_SUCCESSFUL"); 
        } catch(err) {
            addLog("CRITICAL_ERR // MALFORMED_HEX_DATA");
            alert("Payload signature validation error. Aborting injection.");
        }
    };

    // Initialize Operating Elements
    render();
</script>
